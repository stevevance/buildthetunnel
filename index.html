function bearing(a,b){const r=Math.PI/180,d=180/Math.PI;

  if(camBearing===null){camBearing=target; return target;}
  let d=((target-camBearing+540)%360)-180;

  const pop  = (st.population!=null) ? st.population.toLocaleString() : '—';
  const html = '<div class="ttl">'+st.name+'</div>'
    + '<div class="job"><b>'+pop+'</b> residents</div>'
    + '<div class="job"><b>'+jobs+'</b> jobs</div>'
    + '<div class="job"><b>'+hh+'</b> households</div>'
    + '<div class="sub">in '+(st.tractName||'this Census tract')+'</div>';
  callout.setLngLat(st.lonlat).setHTML(html).addTo(map);
}
function hideCallout(){ if(callout){callout.remove();} calloutName=null; }

// non-dwell annotation callout (appears as the camera passes, no pause)
let noteCallout=null, noteName=null;
function showNote(nt){
  if(noteName===nt.name) return;
  noteName=nt.name;
  if(!noteCallout) noteCallout=new maplibregl.Popup({closeButton:false,closeOnClick:false,
    anchor:'bottom',offset:24,className:'note'});
  noteCallout.setLngLat(nt.lonlat).setHTML(nt.name).addTo(map);
}
function hideNote(){ if(noteCallout){noteCallout.remove();} noteName=null; }
function updateNotes(s){
  let active=null;
  for(const nt of D.notes){ if(Math.abs(s-nt.s) < NOTE_RANGE){ active=nt; break; } }
  if(active) showNote(active); else hideNote();
}

let raf=null, elapsed=0, lastTs=null, paused=false, timeline=null;
const pitchEl=()=>+document.getElementById('pitch').value;
const zoomEl=()=>+document.getElementById('zoom').value;
const nowEl=()=>document.getElementById('now');
const pauseBtn=()=>document.getElementById('pause');

function render(el){
  const ph=(()=>{ for(const p of timeline.phases){ if(el>=p.t0 && el<p.t0+p.dur) return p; }
    return timeline.phases[timeline.phases.length-1]; })();
  let s, holding=false, st=null;
  if(ph.type==='move'){
    const lt=Math.min((el-ph.t0)/ph.dur,1);
    s=ph.sFrom+(ph.sTo-ph.sFrom)*smooth(lt);
  } else { s=ph.s; holding=true; st=ph.st; }

  const n=D.path.length, look=10;
  let f=s*(n-1), i=Math.floor(f), fr=f-i;
  let a=D.path[i], b=D.path[Math.min(i+1,n-1)];
  let c=[a[0]+(b[0]-a[0])*fr, a[1]+(b[1]-a[1])*fr];
  let br=easeBearing(bearing(a, D.path[Math.min(i+look,n-1)]));

  // proximity-based zoom target: ramps up near any station, down between them
  let dmin=1; for(const sp of stops) dmin=Math.min(dmin, Math.abs(s-sp));
  let prox=smooth(Math.max(0, 1 - dmin/ZOOM_RANGE));
  let z=easeZoom(zoomEl() + ZOOM_BOOST*prox);

  map.jumpTo({center:c, bearing:br, pitch:pitchEl(), zoom:z});

  if(holding){ showCallout(st); nowEl().textContent='▶ '+st.name; }
  else { hideCallout(); nowEl().textContent=''; }
  updateNotes(s);   // non-dwell annotations near the ends
}

function loop(ts){
  if(lastTs===null) lastTs=ts;
  if(!paused) elapsed += ts-lastTs;
  lastTs=ts;
  render(Math.min(elapsed, timeline.total));
  if(elapsed < timeline.total){ raf=requestAnimationFrame(loop); }
  else { raf=null; nowEl().textContent=''; hideCallout(); pauseBtn().textContent='Replay'; }
}

function startFly(){
  if(raf) cancelAnimationFrame(raf);
  camBearing=null; camZoom=null; elapsed=0; lastTs=null; paused=false;
  hideCallout(); hideNote();
  timeline=buildTimeline();
  pauseBtn().textContent='Pause';
  raf=requestAnimationFrame(loop);
}

map.on('load',()=>{
  map.addSource('crcl',{type:'geojson',
    data:{type:'Feature',geometry:{type:'LineString',coordinates:D.line}}});

  // Tunnel treatment. MapLibre GL JS can't place geometry below grade, so the
  // subsurface alignment is shown the conventional cartographic way: a soft
  // "trench" casing under a dashed tunnel line.
  map.addLayer({id:'crcl-casing',type:'line',source:'crcl',
    layout:{'line-cap':'round','line-join':'round'},
    paint:{'line-color':'#3d2747','line-width':16,'line-opacity':0.25,'line-blur':4}});
  map.addLayer({id:'crcl-line',type:'line',source:'crcl',
    layout:{'line-cap':'round','line-join':'round'},
    paint:{'line-color':'#8d5a99','line-width':10,'line-opacity':0.85,'line-dasharray':[1.6,1.2]}});

  // non-dwell annotation markers (teal) at the two ends
  map.addSource('notes',{type:'geojson',
    data:{type:'FeatureCollection',features:D.notes.map(n=>({type:'Feature',
      properties:{name:n.name},geometry:{type:'Point',coordinates:n.lonlat}}))}});
  map.addLayer({id:'notes',type:'circle',source:'notes',
    paint:{'circle-radius':10,'circle-color':'#0e7c7b','circle-stroke-color':'#fff','circle-stroke-width':2.5}});

  map.addSource('st',{type:'geojson',
    data:{type:'FeatureCollection',features:D.stations.map(s=>({type:'Feature',
      properties:{name:s.name},geometry:{type:'Point',coordinates:s.lonlat}}))}});
  map.addLayer({id:'st',type:'circle',source:'st',
    paint:{'circle-radius':15,'circle-color':'#d62728','circle-stroke-color':'#fff','circle-stroke-width':3}});

  try{ map.setSky({'sky-color':'#bcd4f0','horizon-color':'#e8eef5','fog-color':'#ffffff','fog-ground-blend':0.5}); }catch(e){}
  startFly();
});

document.getElementById('play').onclick=startFly;
document.getElementById('pause').onclick=()=>{
  if(raf===null){ startFly(); return; }       // finished -> replay
  paused=!paused;
  pauseBtn().textContent = paused ? 'Play' : 'Pause';
};
</script></body></html>
